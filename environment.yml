name: hqct
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.26
  - pandas>=2.1
  - scikit-learn>=1.4
  - scipy>=1.12
  - matplotlib>=3.8
  - seaborn>=0.13
  - joblib>=1.3
  - pyyaml>=6.0

  # PyTorch (CPU-only; for GPU replace with appropriate CUDA build)
  - pytorch>=2.1
  - cpuonly

  - pip:
    - xgboost>=2.0
    - lightgbm>=4.0
    - imbalanced-learn>=0.12
    - pennylane>=0.38
    - pennylane-lightning>=0.38
    - scikit-posthocs>=0.9
    - statsmodels>=0.14
    - shap>=0.45
    - tabulate>=0.9
    - ucimlrepo>=0.0.3
    - pytest>=7.4
    - pytest-cov>=4.1
